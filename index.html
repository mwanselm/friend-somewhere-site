<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friend Somewhere</title>
<meta name="description" content="Friend Somewhere — Brooklyn band. Shows, video, and contact.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #f1e0ab;
    --paper-dark: #e6c66f;
    --ink: #2c1a10;
    --coral: #b83b47;
    --coral-dark: #7a2530;
    --orange: #d9701f;
    --orange-dark: #964a09;
  }
  *,*:before,*:after{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Cormorant Garamond', serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  a{ color:inherit; text-decoration:none; }

  .site-header{
    position:relative;
    width:100%;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  .hero-video-bg{ position:absolute; inset:0; z-index:0; }
  .hero-video-bg video{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .hero-overlay{
    position:absolute; inset:0; z-index:1;
    background:linear-gradient(180deg, rgba(44,26,16,.5), rgba(44,26,16,.68));
  }

  .envelope{
    position:relative;
    z-index:2;
    max-width:520px;
    width:90%;
    padding:0;
  }

  .blotter{
    position:relative;
    background:
      repeating-linear-gradient(0deg, transparent 0 34.9px, rgba(122,37,48,.28) 34.9px 35px),
      repeating-linear-gradient(90deg, transparent 0 34.9px, rgba(122,37,48,.28) 34.9px 35px),
      linear-gradient(180deg, var(--paper-dark), var(--paper));
    border:1px solid rgba(44,26,16,.3);
    padding:34px 28px;
    text-align:center;
    box-shadow:0 20px 50px -14px rgba(0,0,0,0.55);
    animation:reveal 1.1s cubic-bezier(.2,.7,.3,1) both;
  }
  @keyframes reveal{ from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);} }
  @media (prefers-reduced-motion: reduce){ .blotter{animation:none;} }

  .blotter::before{
    content:"";
    position:absolute; inset:10px;
    pointer-events:none;
    background-image:
      radial-gradient(circle, var(--paper) 2.2px, transparent 2.3px);
    background-size:16px 16px;
    background-position:0 0;
    -webkit-mask-image:
      linear-gradient(black, black),
      linear-gradient(black, black),
      linear-gradient(black, black),
      linear-gradient(black, black);
    -webkit-mask-size: 100% 16px, 100% 16px, 16px 100%, 16px 100%;
    -webkit-mask-position: top, bottom, left, right;
    -webkit-mask-repeat: no-repeat;
    mask-image:
      linear-gradient(black, black),
      linear-gradient(black, black),
      linear-gradient(black, black),
      linear-gradient(black, black);
    mask-size: 100% 16px, 100% 16px, 16px 100%, 16px 100%;
    mask-position: top, bottom, left, right;
    mask-repeat: no-repeat;
  }
  .blotter-inner{ position:relative; z-index:1; }

  .stamp-icon{
    width:70px; height:auto;
    margin:0 auto 14px;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,.25));
  }
  .stamp-icon img{ width:100%; height:auto; display:block; }

  .band-name{
    font-family:'Playfair Display', serif;
    font-weight:900;
    font-size:clamp(2.1rem, 4.2vw, 3.4rem);
    line-height:1.15;
    color:var(--coral-dark);
    letter-spacing:.5px;
    margin:6px 0 12px;
    text-shadow: 2px 2px 0 rgba(217,112,31,.35);
  }
  .tagline{ font-style:italic; font-size:1.15rem; color:var(--ink); letter-spacing:.5px; margin:0; font-weight:600; }

  #header-socials{
    display:flex; flex-wrap:wrap; gap:12px; justify-content:center;
    margin-top:22px; position:relative; z-index:2;
  }
  #header-socials a{
    display:inline-flex; align-items:center; gap:8px;
    padding:10px 20px;
    background:rgba(44,26,16,.6);
    border:1.5px solid rgba(241,224,171,.5);
    border-radius:999px;
    color:var(--paper);
    font-family:'Cormorant Garamond', serif;
    font-size:1.05rem;
    font-weight:600;
    letter-spacing:.3px;
    transition:background .2s ease, transform .2s ease;
  }
  #header-socials a:hover{ background:var(--coral-dark); transform:translateY(-2px); }
  #header-socials svg{ width:20px; height:20px; fill:currentColor; flex-shrink:0; }

  main{ background:var(--paper); }
  section{ max-width:760px; margin:0 auto; padding:56px 6vw; }
  .eyebrow{
    font-family:'Courier Prime', monospace; font-size:.75rem; letter-spacing:3px; text-transform:uppercase;
    color:var(--coral-dark); font-weight:700; border-bottom:1px solid rgba(122,37,48,.35);
    padding-bottom:10px; margin-bottom:26px;
  }

  .show{
    display:flex; flex-wrap:wrap; align-items:baseline; gap:6px 18px;
    padding:18px 0; border-bottom:1px solid rgba(44,26,16,.2);
  }
  .show:last-of-type{ border-bottom:none; }
  .show-date{ font-family:'Courier Prime', monospace; font-size:.9rem; font-weight:700; color:var(--orange-dark); min-width:100px; }
  .show-main{ flex:1; min-width:200px; }
  .show-venue{ font-size:1.3rem; font-weight:700; }
  .show-with{ font-style:italic; color:var(--ink); font-size:1.05rem; font-weight:600; }
  .show-city{ color:var(--coral-dark); font-size:1.02rem; font-weight:700; letter-spacing:.3px; }
  .show-tix{
    display:inline-block; margin-top:4px; font-family:'Courier Prime', monospace; font-size:.8rem;
    letter-spacing:1px; text-transform:uppercase; color:var(--paper); background:var(--coral-dark);
    padding:8px 16px; border-radius:999px; font-weight:700;
  }
  .no-shows{ font-size:1.15rem; line-height:1.7; padding:10px 0 6px; }

  .contact-cta{
    text-align:center; background:rgba(217,112,31,0.08); border:1px dashed rgba(122,37,48,.4);
    border-radius:16px; padding:32px 24px;
  }
  .contact-cta p{ font-size:1.15rem; margin:0 0 16px; }
  .contact-email{
    display:inline-block; font-family:'Courier Prime', monospace; font-size:1rem; font-weight:700;
    color:var(--ink); background:var(--paper); border:1.5px solid var(--ink);
    padding:10px 20px; border-radius:8px; letter-spacing:.5px;
  }

  .site-footer{
    text-align:center; padding:40px 6vw 60px; font-family:'Courier Prime', monospace; font-size:.7rem;
    letter-spacing:2px; color:var(--coral-dark); text-transform:uppercase; opacity:.8;
  }

  @media (max-width:640px){
    .blotter{ padding:26px 18px; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="hero-video-bg">
    <video autoplay muted loop playsinline poster="assets/hero-poster.jpg">
      <source src="assets/hero-bg.mp4" type="video/mp4">
    </video>
  </div>
  <div class="hero-overlay"></div>

  <div class="envelope">
    <div class="blotter">
      <div class="blotter-inner">
        <div class="stamp-icon">
          <img src="assets/stamp-icon.svg" alt="Friend Somewhere icon">
        </div>
        <h1 class="band-name">Friend Somewhere</h1>
        <p class="tagline">Judge decreed it, clerk he wrote it</p>
      </div>
    </div>

    <div id="header-socials">
      <a href="https://instagram.com/friendsomewhere" title="Instagram" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4.2"/><circle cx="17.2" cy="6.8" r="1.1" fill="currentColor" stroke="none"/></svg>
        @friendsomewhere
      </a>
      <a href="https://youtu.be/wi3_zEfXZSQ?si=qZs63TNwrwweYJ72" title="YouTube" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8zM9.6 15.6V8.4l6.3 3.6-6.3 3.6z"/></svg>
        YouTube
      </a>
    </div>
  </div>
</header>

<main>
  <section aria-label="Shows" id="shows">
    <div class="eyebrow">Shows</div>
    <div id="shows-list"></div>
  </section>

  <section aria-label="Contact" id="contact">
    <div class="eyebrow">Get in touch</div>
    <div class="contact-cta">
      <p>Booking, press, or just want to say hi —</p>
      <a class="contact-email" href="mailto:mark.anselm@gmail.com">hello@friendsomewhere.com</a>
    </div>
  </section>
</main>

<footer class="site-footer">Friend Somewhere &nbsp;·&nbsp; Brooklyn, NY</footer>

<script>
  const SHOWS = [
    { date: "Jul 18, 2026", withBand: "Without a Net", venue: "Private Event", city: "Mount Kisco, NY", ticketUrl: "" },
    { date: "Aug 27, 2026", withBand: "Busy's Dead Collective", venue: "Cobra Club", city: "Brooklyn, NY", ticketUrl: "" },
  ];
  const list = document.getElementById('shows-list');
  if (SHOWS.length === 0) {
    list.innerHTML = `<p class="no-shows">No shows on the books right now — check back soon, or follow on Instagram for the first announcement.</p>`;
  } else {
    list.innerHTML = SHOWS.map(s => `
      <div class="show">
        <span class="show-date">${s.date}</span>
        <div class="show-main">
          <div class="show-venue">${s.venue}</div>
          ${s.withBand ? `<div class="show-with">with ${s.withBand}</div>` : ''}
          <div class="show-city">${s.city}</div>
          ${s.ticketUrl ? `<a class="show-tix" href="${s.ticketUrl}" target="_blank" rel="noopener">Tickets</a>` : ''}
        </div>
      </div>
    `).join('');
  }
</script>

</body>
</html>
