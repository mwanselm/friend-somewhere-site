<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friend Somewhere</title>
<meta name="description" content="Friend Somewhere — Brooklyn band. Shows, video, and contact.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #f1e0ab;
    --paper-dark: #e6c66f;
    --ink: #2c1a10;
    --coral: #b83b47;
    --coral-dark: #7a2530;
    --orange: #d9701f;
    --orange-dark: #964a09;
  }
  *,*:before,*:after{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Cormorant Garamond', serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  a{ color:inherit; text-decoration:none; }

  /* ===== HERO ===== */
  .site-header{
    position:relative;
    width:100%;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  .hero-video-bg{
    position:absolute; inset:0; z-index:0;
  }
  .hero-video-bg video{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
  }
  .hero-overlay{
    position:absolute; inset:0; z-index:1;
    background:linear-gradient(180deg, rgba(44,26,16,.5), rgba(44,26,16,.68));
  }
  .hero-sound-btn{
    position:absolute; bottom:20px; right:20px; z-index:3;
    width:44px; height:44px; border-radius:50%;
    background:rgba(44,26,16,.55); border:1.5px solid rgba(241,224,171,.6);
    color:var(--paper); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    padding:0;
  }
  .hero-sound-btn svg{ width:20px; height:20px; }

  .envelope{
    position:relative;
    z-index:2;
    max-width:560px;
    width:90%;
    padding:0;
  }
  .envelope-flap{
    position:relative;
    z-index:1;
    background:
      repeating-conic-gradient(from 0deg, rgba(217,112,31,0.10) 0deg 8deg, rgba(184,59,71,0.07) 8deg 16deg),
      linear-gradient(180deg, var(--paper-dark), var(--paper));
    border:1px solid rgba(44,26,16,0.35);
    clip-path:polygon(0 0, 50% 34%, 100% 0, 100% 100%, 0 100%);
    padding:78px 6vw 60px;
    text-align:center;
    box-shadow:0 20px 50px -14px rgba(0,0,0,0.55);
    animation:reveal 1.1s cubic-bezier(.2,.7,.3,1) both;
  }
  @keyframes reveal{ from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);} }
  @media (prefers-reduced-motion: reduce){ .envelope-flap{animation:none;} }

  .band-name{
    font-family:'Playfair Display', serif;
    font-weight:900;
    font-size:clamp(2.1rem, 4.2vw, 3.4rem);
    line-height:1.15;
    color:var(--coral-dark);
    letter-spacing:.5px;
    margin:20px 0 12px;
    text-shadow: 2px 2px 0 rgba(217,112,31,.35);
  }
  .tagline{ font-style:italic; font-size:1.15rem; color:var(--ink); letter-spacing:.5px; margin:0 0 8px; font-weight:600; }
  .flourish-row{ display:flex; align-items:center; justify-content:center; gap:14px; opacity:.9; }
  .flourish-row svg{ width:64px; height:auto; fill:none; stroke:var(--coral-dark); stroke-width:1.6; }
  .skull-mark{ width:52px; height:52px; opacity:.95; }
  .skull-mark svg{ width:100%; height:100%; }

  .stamp{
    position:absolute; top:-14px; right:-8px; width:104px; z-index:3;
    background:var(--paper); padding:9px;
    border:1px solid rgba(44,26,16,.4);
    transform:rotate(4deg);
    box-shadow:0 6px 14px -6px rgba(0,0,0,.5);
    -webkit-mask-image:radial-gradient(circle 4.5px at 8px 8px, transparent 98%, black 100%),
                        radial-gradient(circle 4.5px at 8px 100%, transparent 98%, black 100%);
  }
  .stamp-inner{ border:1.5px dashed var(--coral-dark); padding:9px 6px; text-align:center; }
  .stamp-inner .skull-mark{ margin:0 auto 4px; }
  .stamp-label{ font-family:'Courier Prime', monospace; font-size:.52rem; letter-spacing:1.5px; color:var(--coral-dark); text-transform:uppercase; }

  /* ===== SOCIALS ===== */
  #header-socials{
    text-align:center;
    margin-top:22px;
    position:relative; z-index:2;
  }
  #header-socials a{
    display:inline-flex; align-items:center; justify-content:center;
    width:46px; height:46px; margin:0 6px;
    background:rgba(44,26,16,.55);
    border:1.5px solid rgba(241,224,171,.5);
    border-radius:50%;
    color:var(--paper);
    transition:background .2s ease, transform .2s ease;
  }
  #header-socials a:hover{ background:var(--coral-dark); transform:translateY(-2px); }
  #header-socials svg{ width:24px; height:24px; fill:currentColor; }

  /* ===== MAIN SECTIONS ===== */
  main{ background:var(--paper); }
  section{ max-width:760px; margin:0 auto; padding:56px 6vw; }
  .eyebrow{
    font-family:'Courier Prime', monospace; font-size:.75rem; letter-spacing:3px; text-transform:uppercase;
    color:var(--coral-dark); font-weight:700; border-bottom:1px solid rgba(122,37,48,.35);
    padding-bottom:10px; margin-bottom:26px;
  }

  .show{
    display:flex; flex-wrap:wrap; align-items:baseline; gap:6px 18px;
    padding:18px 0; border-bottom:1px solid rgba(44,26,16,.2);
  }
  .show:last-of-type{ border-bottom:none; }
  .show-date{ font-family:'Courier Prime', monospace; font-size:.9rem; font-weight:700; color:var(--orange-dark); min-width:100px; }
  .show-main{ flex:1; min-width:200px; }
  .show-venue{ font-size:1.3rem; font-weight:700; }
  .show-with{ font-style:italic; color:var(--ink); font-size:1.05rem; font-weight:600; }
  .show-city{ color:var(--coral-dark); font-size:1.02rem; font-weight:700; letter-spacing:.3px; }
  .show-tix{
    display:inline-block; margin-top:4px; font-family:'Courier Prime', monospace; font-size:.8rem;
    letter-spacing:1px; text-transform:uppercase; color:var(--paper); background:var(--coral-dark);
    padding:8px 16px; border-radius:999px; font-weight:700;
  }
  .no-shows{ font-size:1.15rem; line-height:1.7; padding:10px 0 6px; }

  .contact-cta{
    text-align:center; background:rgba(217,112,31,0.08); border:1px dashed rgba(122,37,48,.4);
    border-radius:16px; padding:32px 24px;
  }
  .contact-cta p{ font-size:1.15rem; margin:0 0 16px; }
  .contact-email{
    display:inline-block; font-family:'Courier Prime', monospace; font-size:1rem; font-weight:700;
    color:var(--ink); background:var(--paper); border:1.5px solid var(--ink);
    padding:10px 20px; border-radius:8px; letter-spacing:.5px;
  }

  .site-footer{
    text-align:center; padding:40px 6vw 60px; font-family:'Courier Prime', monospace; font-size:.7rem;
    letter-spacing:2px; color:var(--coral-dark); text-transform:uppercase; opacity:.8;
  }

  @media (max-width:640px){
    .stamp{ position:static; transform:rotate(-2deg); margin:0 auto 16px; -webkit-mask-image:none; }
    .envelope-flap{ padding:44px 6vw 44px; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="hero-video-bg">
    <video autoplay muted loop playsinline poster="assets/hero-poster.jpg">
      <source src="assets/hero-bg.mp4" type="video/mp4">
    </video>
  </div>
  <div class="hero-overlay"></div>
  <button class="hero-sound-btn" id="soundToggle" aria-label="Toggle video sound">
    <svg id="soundIconMuted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
    <svg id="soundIconOn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
  </button>

  <div class="envelope">
    <div class="stamp">
      <div class="stamp-inner">
        <div class="skull-mark">
          <svg viewBox="0 0 64 64"><g fill="none" stroke="#7a2530" stroke-width="1.4">
            <path d="M32 6 C18 6 10 16 10 28 C10 36 14 41 18 45 L18 52 L24 52 L24 47 L28 47 L28 52 L36 52 L36 47 L40 47 L40 52 L46 52 L46 45 C50 41 54 36 54 28 C54 16 46 6 32 6 Z"/>
            <path d="M19 26 C21 23 25 23 23 26 C25 29 21 29 19 26 Z"/>
            <path d="M45 26 C43 23 39 23 41 26 C39 29 43 29 45 26 Z"/>
            <path d="M32 30 L29 38 L35 38 Z"/>
            <path d="M22 44 L42 44"/>
            <path d="M25 44 L25 47 M29 44 L29 47 M33 44 L33 47 M37 44 L37 47 M41 44 L41 47"/>
          </g></svg>
        </div>
        <div class="stamp-label">Friend<br>Somewhere</div>
      </div>
    </div>

    <div class="envelope-flap">
      <div class="flourish-row">
        <svg viewBox="0 0 60 30"><path d="M2 15 C 14 2, 20 2, 30 15 C 40 28, 46 28, 58 15"/><circle cx="30" cy="15" r="2" fill="#b83b47"/><circle cx="15" cy="9" r="1.4" fill="#d9701f"/><circle cx="45" cy="21" r="1.4" fill="#7a2530"/></svg>
      </div>
      <h1 class="band-name">Friend<br>Somewhere</h1>
      <p class="tagline">Judge decreed it, clerk he wrote it</p>
      <div class="flourish-row">
        <svg viewBox="0 0 60 30"><path d="M2 15 C 14 28, 20 28, 30 15 C 40 2, 46 2, 58 15"/><circle cx="30" cy="15" r="2" fill="#b83b47"/><circle cx="15" cy="21" r="1.4" fill="#7a2530"/><circle cx="45" cy="9" r="1.4" fill="#d9701f"/></svg>
      </div>
    </div>

    <div id="header-socials">
      <a href="https://instagram.com/friendsomewhere" title="Instagram" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4.2"/><circle cx="17.2" cy="6.8" r="1.1" fill="currentColor" stroke="none"/></svg>
      </a>
    </div>
  </div>
</header>

<main>
  <section aria-label="Shows" id="shows">
    <div class="eyebrow">Shows</div>
    <div id="shows-list"></div>
  </section>

  <section aria-label="Contact" id="contact">
    <div class="eyebrow">Get in touch</div>
    <div class="contact-cta">
      <p>Booking, press, or just want to say hi —</p>
      <a class="contact-email" href="mailto:mark.anselm@gmail.com">hello@friendsomewhere.com</a>
    </div>
  </section>
</main>

<footer class="site-footer">Friend Somewhere &nbsp;·&nbsp; Brooklyn, NY</footer>

<script>
  /*
    SHOW LIST — edit this array to add/remove shows.
    date: "Aug 2, 2026" | withBand: who you're playing with ("" to omit)
    venue: venue name | city: "City, ST" | ticketUrl: link ("" to omit button)
  */
  const SHOWS = [
    { date: "Jul 18, 2026", withBand: "Without a Net", venue: "Private Event", city: "Mount Kisco, NY", ticketUrl: "" },
    { date: "Aug 27, 2026", withBand: "Busy's Dead Collective", venue: "Cobra Club", city: "Brooklyn, NY", ticketUrl: "" },
  ];

  const list = document.getElementById('shows-list');
  if (SHOWS.length === 0) {
    list.innerHTML = `<p class="no-shows">No shows on the books right now — check back soon, or follow on Instagram for the first announcement.</p>`;
  } else {
    list.innerHTML = SHOWS.map(s => `
      <div class="show">
        <span class="show-date">${s.date}</span>
        <div class="show-main">
          <div class="show-venue">${s.venue}</div>
          ${s.withBand ? `<div class="show-with">with ${s.withBand}</div>` : ''}
          <div class="show-city">${s.city}</div>
          ${s.ticketUrl ? `<a class="show-tix" href="${s.ticketUrl}" target="_blank" rel="noopener">Tickets</a>` : ''}
        </div>
      </div>
    `).join('');
  }

  // ===== HERO VIDEO SOUND TOGGLE =====
  const heroVideo = document.querySelector('.hero-video-bg video');
  const soundBtn = document.getElementById('soundToggle');
  const iconMuted = document.getElementById('soundIconMuted');
  const iconOn = document.getElementById('soundIconOn');
  if (heroVideo && soundBtn) {
    soundBtn.addEventListener('click', () => {
      heroVideo.muted = !heroVideo.muted;
      iconMuted.style.display = heroVideo.muted ? 'block' : 'none';
      iconOn.style.display = heroVideo.muted ? 'none' : 'block';
    });
  }
</script>

</body>
</html>
