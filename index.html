<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friend Somewhere</title>
<meta name="description" content="Friend Somewhere — Brooklyn band. Shows, video, and contact.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #f1e0ab;
    --paper-dark: #e6c66f;
    --ink: #2c1a10;
    --coral: #b83b47;
    --coral-dark: #7a2530;
    --orange: #d9701f;
    --orange-dark: #964a09;
  }
  *,*:before,*:after{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Cormorant Garamond', serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  a{ color:inherit; text-decoration:none; }

  /* ===== HERO ===== */
  .site-header{
    position:relative;
    width:100%;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  .hero-video-bg{
    position:absolute; inset:0; z-index:0;
  }
  .hero-video-bg video{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
  }
  .hero-overlay{
    position:absolute; inset:0; z-index:1;
    background:linear-gradient(180deg, rgba(44,26,16,.5), rgba(44,26,16,.68));
  }

  .envelope{
    position:relative;
    z-index:2;
    max-width:560px;
    width:90%;
    padding:0;
  }
  .envelope-flap{
    position:relative;
    z-index:1;
    background:
      repeating-conic-gradient(from 0deg, rgba(217,112,31,0.10) 0deg 8deg, rgba(184,59,71,0.07) 8deg 16deg),
      linear-gradient(180deg, var(--paper-dark), var(--paper));
    border:1px solid rgba(44,26,16,0.35);
    clip-path:polygon(0 0, 50% 34%, 100% 0, 100% 100%, 0 100%);
    padding:78px 6vw 60px;
    text-align:center;
    box-shadow:0 20px 50px -14px rgba(0,0,0,0.55);
    animation:reveal 1.1s cubic-bezier(.2,.7,.3,1) both;
  }
  @keyframes reveal{ from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);} }
  @media (prefers-reduced-motion: reduce){ .envelope-flap{animation:none;} }

  .band-name{
    font-family:'Playfair Display', serif;
    font-weight:900;
    font-size:clamp(2.1rem, 4.2vw, 3.4rem);
    line-height:1.15;
    color:var(--coral-dark);
    letter-spacing:.5px;
    margin:20px 0 12px;
    text-shadow: 2px 2px 0 rgba(217,112,31,.35);
  }
  .tagline{ font-style:italic; font-size:1.15rem;
